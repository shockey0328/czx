<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试看板加载</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #FF6B35;
            border-radius: 8px;
        }
        h2 {
            color: #FF6B35;
            margin-top: 0;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
        .info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }
        button {
            background: #FF6B35;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #E85A2A;
        }
    </style>
</head>
<body>
    <h1>数据看板加载测试</h1>
    
    <div class="test-section">
        <h2>测试1: 核心数据看板（周度）</h2>
        <button onclick="loadDashboard('core')">加载看板</button>
        <div class="info" id="coreInfo">点击按钮加载看板</div>
        <iframe id="coreFrame" style="display:none;"></iframe>
    </div>

    <div class="test-section">
        <h2>测试2: 搜索数据看板（周度）</h2>
        <button onclick="loadDashboard('search')">加载看板</button>
        <div class="info" id="searchInfo">点击按钮加载看板</div>
        <iframe id="searchFrame" style="display:none;"></iframe>
    </div>

    <div class="test-section">
        <h2>当前路径信息</h2>
        <div class="info">
            <p><strong>当前URL:</strong> <span id="currentUrl"></span></p>
            <p><strong>协议:</strong> <span id="protocol"></span></p>
            <p><strong>主机:</strong> <span id="host"></span></p>
        </div>
    </div>

    <script>
        // 显示当前路径信息
        document.getElementById('currentUrl').textContent = window.location.href;
        document.getElementById('protocol').textContent = window.location.protocol;
        document.getElementById('host').textContent = window.location.host || '(本地文件)';

        function loadDashboard(type) {
            let frame, info, path;
            
            if (type === 'core') {
                frame = document.getElementById('coreFrame');
                info = document.getElementById('coreInfo');
                path = '核心数据看板（周度）/index.html';
            } else if (type === 'search') {
                frame = document.getElementById('searchFrame');
                info = document.getElementById('searchInfo');
                path = '搜索数据看板（周度）/index.html';
            }

            info.innerHTML = `正在加载: ${path}`;
            frame.style.display = 'block';
            
            frame.onload = function() {
                info.innerHTML = `✅ 加载成功: ${path}`;
                console.log(`${type} 看板加载成功`);
            };
            
            frame.onerror = function(e) {
                info.innerHTML = `❌ 加载失败: ${path}<br>错误: ${e.message || '未知错误'}`;
                console.error(`${type} 看板加载失败:`, e);
            };

            try {
                frame.src = path;
                console.log(`尝试加载: ${path}`);
            } catch (e) {
                info.innerHTML = `❌ 设置src失败: ${e.message}`;
                console.error('设置src失败:', e);
            }
        }

        // 检测文件是否存在
        async function checkFile(path) {
            try {
                const response = await fetch(path, { method: 'HEAD' });
                return response.ok;
            } catch (e) {
                return false;
            }
        }

        // 自动检测文件
        window.addEventListener('load', async () => {
            const paths = [
                '核心数据看板（周度）/index.html',
                '搜索数据看板（周度）/index.html'
            ];

            console.log('开始检测文件...');
            for (const path of paths) {
                const exists = await checkFile(path);
                console.log(`${path}: ${exists ? '存在' : '不存在'}`);
            }
        });
    </script>
</body>
</html>
