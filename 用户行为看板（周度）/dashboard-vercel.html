<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户行为看板 - Vercel版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .query-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #FF6B35;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #FF6B35;
            color: white;
        }

        .btn-primary:hover {
            background: #E85A2A;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: #FF6B35;
            border: 2px solid #FF6B35;
        }

        .btn-secondary:hover {
            background: #FFF5F2;
        }

        .results-section {
            padding: 30px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #FF6B35;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: bold;
            color: #333;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        .analysis-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .analysis-section h3 {
            color: #FF6B35;
            margin-bottom: 15px;
        }

        .analysis-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 用户行为看板</h1>
            <p>Vercel Serverless版 - 数据来自GitHub Releases</p>
        </div>

        <div class="query-section">
            <div class="alert alert-info">
                <strong>💡 提示：</strong> 此版本使用Vercel Serverless Functions，数据从GitHub Releases动态加载。
            </div>

            <div class="form-group">
                <label>用户ID（多个用户用逗号分隔）</label>
                <input type="text" id="userIds" placeholder="例如：user001,user002">
            </div>

            <div class="form-group">
                <label>开始日期</label>
                <input type="date" id="startDate" value="2026-02-26" min="2026-02-26" max="2026-03-04">
            </div>

            <div class="form-group">
                <label>结束日期</label>
                <input type="date" id="endDate" value="2026-03-04" min="2026-02-26" max="2026-03-04">
            </div>

            <div class="form-group">
                <label>分析描述（可选）</label>
                <textarea id="description" rows="3" placeholder="描述你想了解的问题，例如：为什么用户在支付页面流失？"></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="queryData()">🔍 查询数据</button>
                <button class="btn btn-secondary" onclick="analyzeData()">🤖 AI分析</button>
            </div>
        </div>

        <div class="results-section" id="results">
            <div class="alert alert-info">
                <strong>📋 使用说明：</strong>
                <ol style="margin-top: 10px; margin-left: 20px;">
                    <li>输入用户ID（必填）</li>
                    <li>选择日期范围（2026-02-26 至 2026-03-04）</li>
                    <li>点击"查询数据"查看用户行为记录</li>
                    <li>点击"AI分析"获取智能分析报告</li>
                </ol>
            </div>
        </div>
    </div>

    <script>
        let currentData = [];

        async function queryData() {
            const userIdsInput = document.getElementById('userIds').value.trim();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const results = document.getElementById('results');

            if (!userIdsInput) {
                results.innerHTML = '<div class="alert alert-error">请输入用户ID</div>';
                return;
            }

            const userIds = userIdsInput.split(',').map(id => id.trim()).filter(id => id);

            results.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在从GitHub Releases加载数据...</p>
                    <p style="font-size: 14px; color: #999; margin-top: 10px;">首次加载可能需要10-30秒</p>
                </div>
            `;

            try {
                const response = await fetch('/api/getData', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userIds,
                        startDate,
                        endDate
                    })
                });

                const result = await response.json();

                if (!result.success) {
                    results.innerHTML = `<div class="alert alert-error">查询失败：${result.error}</div>`;
                    return;
                }

                currentData = result.data;

                if (currentData.length === 0) {
                    results.innerHTML = `
                        <div class="alert alert-info">
                            <strong>未找到数据</strong><br>
                            用户ID：${userIds.join(', ')}<br>
                            日期范围：${startDate} 至 ${endDate}
                        </div>
                    `;
                    return;
                }

                let html = `
                    <div class="alert alert-success">
                        <strong>✅ 查询成功</strong><br>
                        找到 ${result.totalRecords} 条记录<br>
                        加载的日期：${result.loadedDates.join(', ')}
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>用户ID</th>
                                <th>事件类型</th>
                                <th>URL</th>
                                <th>元素</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                currentData.slice(0, 100).forEach(record => {
                    html += `
                        <tr>
                            <td>${record.xyio_client_time || ''}</td>
                            <td>${record.user_id || ''}</td>
                            <td>${record.log_event_type || ''}</td>
                            <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">${record.url || ''}</td>
                            <td>${record.element_content || record.element_name || ''}</td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                `;

                if (currentData.length > 100) {
                    html += `<p style="margin-top: 15px; color: #666;">显示前100条记录，共${currentData.length}条</p>`;
                }

                results.innerHTML = html;

            } catch (error) {
                console.error('查询错误:', error);
                results.innerHTML = `<div class="alert alert-error">查询失败：${error.message}</div>`;
            }
        }

        async function analyzeData() {
            if (currentData.length === 0) {
                alert('请先查询数据');
                return;
            }

            const description = document.getElementById('description').value.trim();
            const results = document.getElementById('results');

            const currentHTML = results.innerHTML;
            results.innerHTML = currentHTML + `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>AI正在分析用户行为...</p>
                </div>
            `;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        logs: currentData,
                        userDescription: description
                    })
                });

                const result = await response.json();

                if (!result.success) {
                    results.innerHTML = currentHTML + `<div class="alert alert-error">分析失败：${result.error}</div>`;
                    return;
                }

                results.innerHTML = currentHTML + `
                    <div class="analysis-section">
                        <h3>🤖 AI分析报告</h3>
                        <div class="analysis-content">${result.analysis}</div>
                    </div>
                `;

            } catch (error) {
                console.error('分析错误:', error);
                results.innerHTML = currentHTML + `<div class="alert alert-error">分析失败：${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
